<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Registro de Perfil Base</title>
</head>
<body>
    <h2>Crear Cuenta en FDP Market</h2>
    
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/usuario/registro}" method="post">
        <div>
            <label>Correo Electronico:</label>
            <input type="email" name="correo" required="required" />
        </div>
        <div>
            <label>Contrasena:</label>
            <input type="password" name="password" required="required" />
        </div>
        <div>
            <label>Tipo de Perfil:</label>
            <select name="rol">
                <option value="Cliente">Quiero Comprar (Cliente)</option>
                <option value="Vendedor">Quiero Vender (Vendedor)</option>
            </select>
        </div>
        <button type="submit">Registrarse</button>
    </form>
    <p>Ya tienes cuenta? <a th:href="@{/login}">Inicia sesion aqui</a></p>
</body>
</html>
