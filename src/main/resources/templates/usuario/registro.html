<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>

        <section class="container py-5" style="max-width: 500px;">
            <h2 th:text="#{usuario.titulo}">Crear Cuenta en FDP Market</h2>

            <div th:if="${error}" class="alert alert-danger" role="alert">
                <p th:text="${error}" class="mb-0"></p>
            </div>

            <form th:action="@{/usuario/registro}" method="post" class="card p-4 shadow-sm">
                <div class="mb-3">
                    <label class="form-label" th:text="#{usuario.correo}">Correo Electronico:</label>
                    <input type="email" name="correo" class="form-control" required="required" />
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{usuario.clave}">Contrasena:</label>
                    <input type="password" name="password" class="form-control" required="required" />
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{usuario.perfil}">Tipo de Perfil:</label>
                    <select name="rol" class="form-select">
                        <option value="Cliente" th:text="#{usuario.opcion_cliente}">Quiero Comprar (Cliente)</option>
                        <option value="Vendedor" th:text="#{usuario.opcion_vendedor}">Quiero Vender (Vendedor)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100" th:text="#{usuario.btn_registrar}">Registrarse</button>
            </form>
            <p class="mt-3 text-center">
                <a th:href="@{/login}" th:text="#{usuario.link_login}">Ya tienes cuenta? Inicia sesion aqui</a>
            </p>
        </section>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
