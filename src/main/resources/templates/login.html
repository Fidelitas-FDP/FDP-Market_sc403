<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>

        <section class="container py-5" style="max-width: 400px;">
            <h2 class="mb-4 text-center">Iniciar Sesión</h2>
            
            <div th:if="${param.error}" class="alert alert-danger">
                Usuario o contraseña incorrectos.
            </div>

            <form th:action="@{/login}" method="post" class="card p-4 shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico:</label>
                    <input type="email" name="username" class="form-control" required="required" />
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña:</label>
                    <input type="password" name="password" class="form-control" required="required" />
                </div>
                <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>
        </section>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
