<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <meta charset="UTF-8"/>
        <title>Chat de Orden OSRS</title>
    </head>
    <body>
        <h2>Canal de Coordinacion de Entrega</h2>

        <div style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px;">
            <div th:each="msg : ${mensajes}">
                <p><span th:text="${msg.usuarioEmisor.correo}"></span>: 
                    <strong th:text="${msg.contenido}"></strong>
                </p>
            </div>
        </div>
    </body>
</html>
