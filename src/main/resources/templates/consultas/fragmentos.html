<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"/>
<body>

    <section th:fragment="tabs" class="py-3 mb-4">
        <div class="d-flex justify-content-center px-5"> 
            <ul class="nav nav-underline">
                <li th:each="c : ${categorias}" th:if="${c.padre == null}" class="nav-item">
                    <a th:href="@{/anuncio/catalogo/{id}(id=${c.id})}" class="nav-link">
                        [[${c.nombre}]]
                    </a>
                </li>
            </ul>
        </div>
    </section>

    <section th:fragment="tarjetas" class="container py-4">
        <h3 class="mb-4">[[#{anuncio.titulo_tabla}]]</h3>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
            <div th:each="anuncio : ${anuncios}" class="col">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="card-title text-center text-truncate mb-0" th:text="${anuncio.titulo}"></h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <p class="card-text text-muted mb-auto" th:text="${anuncio.descripcion}"></p>
                        <div class="mt-3">
                            <span class="fw-bold text-success h5" th:text="'$' + ${anuncio.precioActual}"></span>
                        </div>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                        <span th:text="${anuncio.stockGenerico != null ? anuncio.stockGenerico + ' units' : 'Unlimited'}" class="badge bg-info mt-1"></span>
                        
                        <form th:if="${anuncio.activo}" th:action="@{/anuncio/pausar}" method="post" class="d-inline">
                            <input type="hidden" name="idAnuncio" th:value="${anuncio.id}" />
                            <input type="hidden" name="activo" th:value="false" />
                            <input type="hidden" name="categoriaId" th:value="${anuncio.categoria.id}" />
                            <button type="submit" class="btn btn-sm btn-danger">[[#{anuncio.btn_pausar}]]</button>
                        </form>
                        <form th:unless="${anuncio.activo}" th:action="@{/anuncio/activar}" method="post" class="d-inline">
                            <input type="hidden" name="idAnuncio" th:value="${anuncio.id}" />
                            <input type="hidden" name="categoriaId" th:value="${anuncio.categoria.id}" />
                            <button type="submit" class="btn btn-sm btn-success">[[#{anuncio.btn_activar}]]</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
